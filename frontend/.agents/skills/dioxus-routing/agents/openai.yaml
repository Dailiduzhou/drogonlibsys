interface:
  display_name: "Dioxus Routing"
  short_description: "Implement client-side routing with dioxus-router for multi-page applications"
  icon_small: "./assets/routing-icon-small.svg"
  icon_large: "./assets/routing-icon-large.png"
  brand_color: "#FF6B35"
  default_prompt: "Help me set up routing for my Dioxus application with navigation and route parameters"

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "file_system"
      description: "Required for creating routing configuration files"
    - type: "code_editor"
      description: "Required for writing and editing route definitions"
  crates:
    - name: "dioxus-router"
      version: "0.7"
      description: "Official Dioxus router for client-side navigation"
      required: true
    - name: "dioxus"
      version: "0.7"
      features: ["router"]
      description: "Core Dioxus framework with router features enabled"
      required: true

metadata:
  version: "1.0.0"
  author: "Dioxus Skills Team"
  tags: ["dioxus", "rust", "routing", "navigation", "spa", "client-side", "url", "parameters"]
  supported_features: [
    "nested_routes",
    "route_parameters",
    "query_strings",
    "programmatic_navigation",
    "route_guards",
    "active_links",
    "layouts",
    "lazy_loading",
    "error_boundaries",
    "breadcrumbs"
  ]
  complexity_level: "intermediate"
  rust_version_min: "1.70.0"
  use_cases: [
    "multi_page_applications",
    "single_page_applications",
    "dashboard_navigation",
    "e_commerce_sites",
    "blog_applications",
    "admin_panels"
  ]
