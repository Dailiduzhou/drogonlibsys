interface:
  display_name: "Dioxus Component Development"
  short_description: "Create and optimize Dioxus components with proper patterns and RSX syntax"
  icon_small: "./assets/component-icon-small.svg"
  icon_large: "./assets/component-icon-large.png"
  brand_color: "#FF6B35"
  default_prompt: "Help me create a new Dioxus component with proper structure and patterns"

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "file_system"
      description: "Required for creating and editing component files"
    - type: "code_editor"
      description: "Required for writing and formatting Rust/RSX code"
  language_features:
    - language: "rust"
      features: ["macros", "async", "closures", "pattern_matching"]
      description: "Core Rust features used in Dioxus components"
    - language: "rsx"
      description: "Dioxus RSX macro syntax for UI markup"

metadata:
  version: "1.0.0"
  author: "Dioxus Skills Team"
  tags: ["dioxus", "rust", "components", "rsx", "ui", "frontend", "reactive"]
  supported_patterns: [
    "functional_components",
    "props_handling",
    "state_management",
    "event_handling",
    "lifecycle_hooks",
    "error_boundaries",
    "performance_optimization"
  ]
  rust_version_min: "1.70.0"
  complexity_level: "intermediate"
