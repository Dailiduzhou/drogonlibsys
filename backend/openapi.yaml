openapi: 3.0.3
info:
  title: Library Management System API
  description: Drogon-based library management system with JWT auth, MinIO cover storage, PostgreSQL full-text search, and Redis caching.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Auth
    description: Authentication & token management
  - name: Books
    description: Book CRUD & cover upload
  - name: Loans
    description: Borrow / return & loan record management
  - name: Search
    description: Full-text search (PostgreSQL tsvector + GIN index)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access Token obtained from /api/auth/login or /api/auth/refresh

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: "0 = success; non-zero = error code matching HTTP status"
          example: 0
        msg:
          type: string
          example: ok
        data:
          nullable: true

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        accessExpiresAt:
          type: integer
          format: int64
          description: Unix timestamp (seconds)
        refreshExpiresAt:
          type: integer
          format: int64

    Book:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        author:
          type: string
        description:
          type: string
        coverKey:
          type: string
          description: MinIO object key
        stock:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BookCreate:
      type: object
      required: [title, author]
      properties:
        title:
          type: string
        author:
          type: string
        description:
          type: string
        coverKey:
          type: string
        stock:
          type: integer
          default: 0

    BookUpdate:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        description:
          type: string
        coverKey:
          type: string
        stock:
          type: integer

    LoanRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bookId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        status:
          type: string
          enum: [borrowed, returned]
        borrowedAt:
          type: string
          format: date-time
        returnedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LoanCreate:
      type: object
      required: [bookId, userId, borrowedAt]
      properties:
        bookId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        status:
          type: string
          default: borrowed
        borrowedAt:
          type: string
          format: date-time
        returnedAt:
          type: string
          format: date-time

    LoanUpdate:
      type: object
      required: [bookId, userId, status, borrowedAt]
      properties:
        bookId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        status:
          type: string
          enum: [borrowed, returned]
        borrowedAt:
          type: string
          format: date-time
        returnedAt:
          type: string
          format: date-time

    CoverUploadResult:
      type: object
      properties:
        coverKey:
          type: string
        coverUrl:
          type: string

    Error:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          nullable: true

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register
      description: Create a new user with username and password, then return an access + refresh token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Register success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenPair"
        "400":
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: User creation or token issuance failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticate with username and password, returns access + refresh token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenPair"
        "400":
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh tokens
      description: Exchange a valid refresh token for a new token pair. The old access token is blacklisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Refresh success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenPair"
        "400":
          description: Missing refreshToken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Blacklist the current access token in Redis.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/books:
    get:
      tags: [Books]
      summary: List books
      description: Paginated book list. Public access.
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Book list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Book"
    post:
      tags: [Books]
      summary: Create book
      description: Add a new book. Requires authentication.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookCreate"
      responses:
        "200":
          description: Book created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: integer
                            format: int64
        "400":
          description: Missing title or author
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/books/{id}:
    get:
      tags: [Books]
      summary: Get book detail
      description: Single book detail with Singleflight + Redis cache. Public access.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Book detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Book"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Books]
      summary: Update book
      description: Update book info. Requires authentication.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Books]
      summary: Delete book
      description: Delete book and its cover from MinIO. Requires authentication.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/books/{id}/cover:
    post:
      tags: [Books]
      summary: Upload cover image
      description: Upload a cover image via multipart/form-data. Stored in MinIO. Requires authentication.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Cover uploaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CoverUploadResult"
        "400":
          description: No file uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/books/{id}/borrow:
    post:
      tags: [Loans]
      summary: Borrow a book
      description: Create a loan record and decrement stock. Requires authentication.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Book ID
      responses:
        "200":
          description: Borrowed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoanRecord"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Out of stock or already borrowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/books/{id}/return:
    post:
      tags: [Loans]
      summary: Return a book
      description: Mark loan as returned and increment stock. Requires authentication.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Book ID
      responses:
        "200":
          description: Returned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoanRecord"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Book or loan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/loans:
    get:
      tags: [Loans]
      summary: List loan records
      description: "Admin sees all records; regular user sees only their own. Requires authentication."
      security:
        - BearerAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Loan record list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/LoanRecord"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Loans]
      summary: Create loan record (admin only)
      description: Manually create a loan record. Admin role required.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanCreate"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: integer
                            format: int64
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/loans/{id}:
    get:
      tags: [Loans]
      summary: Get loan record detail
      description: "Admin sees any record; regular user sees only their own. Requires authentication."
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Loan record detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoanRecord"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden (not own record)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Loan record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Loans]
      summary: Update loan record (admin only)
      description: Admin-only loan record update.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Loans]
      summary: Delete loan record (admin only)
      description: Admin-only loan record deletion.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/search:
    get:
      tags: [Search]
      summary: Full-text search
      description: Search books by keyword using PostgreSQL tsvector + GIN index. Public access.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search keyword
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Book"
        "400":
          description: Missing query param 'q'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
